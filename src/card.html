<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Card</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            color-scheme: light;
            font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 232, 214, 0.92), transparent 42%),
                radial-gradient(circle at bottom right, rgba(210, 237, 255, 0.8), transparent 38%),
                rgba(255, 250, 245, 0.98);
        }

        body {
            min-height: 100vh;
            padding: 18px;
            color: #1b1713;
            background: transparent;
        }

        .card-shell {
            height: 100%;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(120, 99, 78, 0.12);
            box-shadow: 0 24px 60px rgba(95, 75, 53, 0.18);
            backdrop-filter: blur(18px);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .mode-badge {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 0 12px;
            border-radius: 999px;
            background: rgba(208, 130, 60, 0.12);
            color: #8a4f19;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .settings-btn {
            border: none;
            border-radius: 999px;
            background: rgba(38, 35, 31, 0.08);
            color: #423830;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .prompt-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .prompt {
            font-size: 28px;
            line-height: 1.18;
            font-weight: 700;
            color: #1c1714;
        }

        .prompt-hint {
            font-size: 13px;
            color: #73665d;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
            min-height: 78px;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(67, 58, 48, 0.12);
            background: rgba(255, 255, 255, 0.95);
            cursor: pointer;
            text-align: left;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 12px 30px rgba(92, 72, 49, 0.12);
            border-color: rgba(67, 58, 48, 0.22);
        }

        .option-btn:disabled {
            cursor: default;
            opacity: 1;
        }

        .option-btn.correct {
            border-color: rgba(28, 151, 87, 0.45);
            background: rgba(223, 247, 232, 0.98);
        }

        .option-btn.wrong {
            border-color: rgba(208, 66, 51, 0.42);
            background: rgba(255, 234, 231, 0.98);
        }

        .option-btn.selected {
            box-shadow: inset 0 0 0 1px rgba(67, 58, 48, 0.12);
        }

        .option-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 999px;
            background: rgba(67, 58, 48, 0.08);
            color: #53463d;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .option-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .option-label {
            font-size: 16px;
            line-height: 1.35;
            font-weight: 600;
            color: #201914;
        }

        .option-detail {
            font-size: 12px;
            color: #7a6a60;
        }

        .answer-panel {
            border-radius: 16px;
            background: rgba(45, 36, 27, 0.06);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .answer-panel[hidden] {
            display: none;
        }

        .answer-title {
            font-size: 18px;
            font-weight: 700;
            color: #1c1714;
        }

        .answer-detail {
            font-size: 14px;
            line-height: 1.5;
            color: #5b4d42;
        }

        .footer {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-actions {
            display: flex;
            gap: 10px;
        }

        .ghost-btn,
        .accent-btn,
        .continue-btn {
            border: none;
            border-radius: 12px;
            padding: 11px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .ghost-btn {
            flex: 1;
            background: rgba(67, 58, 48, 0.09);
            color: #433930;
        }

        .accent-btn {
            flex: 1.2;
            background: rgba(235, 175, 115, 0.24);
            color: #8f4c0d;
        }

        .continue-btn {
            width: 100%;
            background: #1c8f57;
            color: #fff;
        }

        .feedback-status {
            min-height: 18px;
            font-size: 12px;
            color: #6e6055;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card-shell">
        <div class="topbar">
            <div class="mode-badge" id="modeBadge">等待提醒</div>
            <button class="settings-btn" id="btnSettings" type="button">设置</button>
        </div>

        <section class="prompt-wrap">
            <div class="prompt" id="prompt"></div>
            <div class="prompt-hint" id="promptHint" hidden></div>
        </section>

        <section class="options" id="options"></section>

        <section class="answer-panel" id="answerPanel" hidden>
            <div class="answer-title" id="answerTitle"></div>
            <div class="answer-detail" id="answerDetail"></div>
        </section>

        <div class="footer">
            <div class="footer-actions">
                <button class="ghost-btn" id="btnSkip" type="button">跳过 (Esc)</button>
                <button class="accent-btn" id="btnNotInterested" type="button">这张词先别再推</button>
            </div>
            <button class="continue-btn" id="btnContinue" type="button" hidden>知道了，继续</button>
            <div class="feedback-status" id="feedbackStatus"></div>
        </div>
    </div>

    <script type="module" src="/src/card.ts"></script>
</body>
</html>
